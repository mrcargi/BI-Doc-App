services:
  - type: web
    name: bi-hub
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
      - key: ADMIN_DEFAULT_EMAIL
        value: "admin@nadro.com"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: NODE_VERSION
        value: "20.11.0"
    disk:
      name: bi-hub-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
